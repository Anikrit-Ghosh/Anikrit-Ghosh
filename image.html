<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic 3D Transition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #020617; /* Navy blue background */
        }
        .perspective-container {
            perspective: 1000px;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-3d {
            width: 80%;
            max-width: 1000px;
            aspect-ratio: 16 / 9;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.5);
            border-radius: 24px;
            overflow: hidden;
        }
        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: translateZ(0);
        }
        /* Glossy overlay effect */
        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 100%);
            pointer-events: none;
            z-index: 2;
        }
        /* Floating particles for cinematic feel */
        .particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 3;
        }
        .particle {
            position: absolute;
            background: rgba(251, 146, 60, 0.4); /* Orange-ish glow */
            border-radius: 50%;
            filter: blur(2px);
            animation: float 10s infinite linear;
        }
        @keyframes float {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
        }
    </style>
    
</head>
<body>
    <div class="perspective-container" id="container">
        <div class="card-3d" id="card">
            <div class="card-overlay"></div>
            <img src="./image.png" alt="Cinematic Portrait" class="card-image">
            <div class="particles" id="particles"></div>
            <!-- UI Overlay for branding context -->
            <div class="absolute inset-0 flex flex-col justify-end p-12 bg-gradient-to-t from-black/60 to-transparent z-10 pointer-events-none">
                <h1 class="text-white text-5xl font-bold tracking-tight mb-4 opacity-0 transition-opacity duration-1000 delay-500" id="title">
                    ANIKRIT GHOSH 
                    <span class="text-orange-500">AI ML DEVELOPER</span>
                </h1>
                <p class="text-blue-200 text-lg max-w-md opacity-0 transition-opacity duration-1000 delay-700" id="subtitle">
                    Passionate about building production-ready AI & full-stack applications
                </p>
            </div>
        </div>
    </div>

    <script>
        const card = document.getElementById('card');
        const container = document.getElementById('container');
        const title = document.getElementById('title');
        const subtitle = document.getElementById('subtitle');
        const particlesContainer = document.getElementById('particles');

        // Create particles
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 6 + 2;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + '%';
            p.style.top = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 10 + 's';
            p.style.animationDuration = (Math.random() * 10 + 10) + 's';
            particlesContainer.appendChild(p);
        }

        // 3D Tilt Effect
        container.addEventListener('mousemove', (e) => {
            const { clientX, clientY } = e;
            const { innerWidth, innerHeight } = window;
            
            const xRotation = (clientY / innerHeight - 0.5) * 20; // Max 10 degrees
            const yRotation = (clientX / innerWidth - 0.5) * -20; // Max 10 degrees
            
            card.style.transform = `rotateX(${xRotation}deg) rotateY(${yRotation}deg)`;
        });

        container.addEventListener('mouseleave', () => {
            card.style.transform = `rotateX(0deg) rotateY(0deg)`;
        });

        // Entrance animation
        window.addEventListener('load', () => {
            title.style.opacity = '1';
            subtitle.style.opacity = '1';
            card.style.transition = 'transform 1.5s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 1.5s ease';
            card.style.opacity = '1';
            
            // Re-enable smooth mouse tracking after intro
            setTimeout(() => {
                card.style.transition = 'transform 0.1s ease-out';
            }, 1500);
        });
    </script>
</body>
</html>
